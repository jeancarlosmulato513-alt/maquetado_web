<!DOCTYPE html>
<!-- Indica al navegador que el documento está escrito en HTML5.
Sirve para que la página se interprete correctamente. -->
<html lang="en">
<!-- Es la etiqueta principal que contiene todo el contenido de la página. -->
<head>
<!-- Contiene información de configuración de la página que no se ve directamente en el contenido. -->
    <meta charset="UTF-8">
<!-- Define la codificación de caracteres. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Hace que la página se adapte a celulares, tablets y pantallas pequeñas. -->
    <title>Document</title>
<!-- Define el título de la página que aparece en: -->
</head>
<body>
<!-- Aquí va todo lo visible de la página web -->
</body>
</html>

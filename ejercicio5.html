<!DOCTYPE html>
<!-- Indica que el documento usa HTML5 -->

<html lang="en">
<!-- Etiqueta principal de la página -->
<!-- lang="en" significa que el idioma está en inglés -->

<head>
    <!-- Contiene configuraciones internas -->

    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales como ñ, á, é -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se adapte a celulares y tablets -->

    <title>Mi Página Explicada</title>
    <!-- Título que aparece en la pestaña del navegador -->

</head>

<body>
    <!-- Todo lo visible de la página va aquí -->

    <h1>Ejemplo de Lista</h1>
    <!-- Título principal -->

    <ul>
        <!-- Lista desordenada con viñetas -->

        <li>Elemento 1</li>
        <!-- Primer elemento de la lista -->

        <li>Elemento 2</li>
        <!-- Segundo elemento de la lista -->

        <li>Elemento 3</li>
        <!-- Tercer elemento de la lista -->

    </ul>

</body>
</html>
